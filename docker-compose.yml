services:
  postgres:
    image: postgres:16-alpine
    container_name: treeo2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: treeo2
      POSTGRES_USER: treeo2_user
      POSTGRES_PASSWORD: treeo2_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U treeo2_user -d treeo2']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
